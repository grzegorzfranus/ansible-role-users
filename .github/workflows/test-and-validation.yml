---
name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - "feature/*"
      - "release/*"
      - "bugfix/*"
      - "hotfix/*"

jobs:
  lint:
    name: 1. Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: 1.1 Checkout Code
        uses: actions/checkout@v6

      - name: 1.2 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: 1.3 Install Dependencies
        run: |
          pip3 install yamllint

      - name: 1.4 Lint Code
        run: |
          yamllint .

  molecule:
    name: 2. Molecule Test
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        include:
          - scenario: default
            distro: ubuntu2204
          - scenario: default
            distro: rockylinux9
          - scenario: default
            distro: ubuntu2404
          - scenario: default
            distro: debian12
          - scenario: default
            distro: debian11

    steps:
      - name: 2.1 Checkout Code
        uses: actions/checkout@v6

      - name: 2.2 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: 2.3 Install Dependencies
        run: |
          pip3 install ansible molecule molecule-plugins[docker] docker ansible-lint

      - name: 2.4 Run Molecule Test
        run: |
          molecule test --scenario-name ${{ matrix.scenario }}
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          MOLECULE_DISTRO: ${{ matrix.distro }}
