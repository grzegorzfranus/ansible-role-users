---
name: "CI"

on:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # ================================================================
  # 1. BRANCH NAME VALIDATION (Pre-hook)
  # ================================================================
  branch-name-lint:
    name: "Branch Name Lint"
    runs-on: ubuntu-latest
    steps:
      - name: "Validate branch name"
        env:
          BRANCH_NAME: ${{ github.head_ref }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            {
              echo "### ✅ Branch Name Validation Skipped"
              echo "Branch validation is only enforced on Pull Requests."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          REGEX="^(feature|bugfix|hotfix|release|docs|refactor|test|chore|ci)/.+|^release-please--.*"

          if [[ ! "$BRANCH_NAME" =~ $REGEX ]]; then
            echo "::error::Invalid branch name: '$BRANCH_NAME'"
            {
              echo "### ❌ Branch Name Validation Failed"
              echo ""
              echo "The source branch name **'$BRANCH_NAME'** does not conform to the repository naming conventions."
              echo ""
              echo "#### 🧭 Allowed Prefixes"
              echo "- \`feature/\` — New features or enhancements"
              echo "- \`bugfix/\` — Bug fixes"
              echo "- \`hotfix/\` — Critical production fixes"
              echo "- \`release/\` — Release branches"
              echo "- \`docs/\` — Documentation updates"
              echo "- \`refactor/\` — Code refactoring"
              echo "- \`test/\` — Test additions or corrections"
              echo "- \`chore/\` — Maintenance tasks"
              echo "- \`ci/\` — CI/CD changes"
              echo ""
              echo "#### 💡 How to fix"
              echo "Rename your branch locally using:"
              echo "\`\`\`bash"
              echo "git branch -m <new-name>"
              echo "git push origin -u <new-name>"
              echo "\`\`\`"
              echo "Then close this PR and open a new one."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          {
            echo "### ✅ Branch Name Validation Passed"
            echo "Branch name **'$BRANCH_NAME'** conforms to conventions."
          } >> "$GITHUB_STEP_SUMMARY"

  # ================================================================
  # 1b. PR TITLE VALIDATION (Pre-hook)
  # ----------------------------------------------------------------
  # Enforces Conventional Commits naming conventions on PR titles.
  # Runs first to fail fast and save runner execution minutes.
  # ================================================================
  pr-title-lint:
    name: "PR Title Lint"
    runs-on: ubuntu-latest
    steps:
      - name: "Validate PR title"
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            {
              echo "### ✅ PR Title Validation Skipped"
              echo "PR title validation is only enforced on Pull Requests."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          REGEX="^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-zA-Z0-9_-]+\))?!?: .+$"

          if [[ ! "$PR_TITLE" =~ $REGEX ]]; then
            echo "::error::Invalid PR title: '$PR_TITLE'"
            {
              echo "### ❌ PR Title Validation Failed"
              echo ""
              echo "The Pull Request title **'$PR_TITLE'** does not conform to Conventional Commits."
              echo ""
              echo "#### 🧭 Allowed Format"
              echo "\`<type>(<scope>)!: <description>\` (scope and ! are optional)"
              echo ""
              echo "#### 💡 Allowed Types"
              echo "- \`feat\` — New features"
              echo "- \`fix\` — Bug fixes"
              echo "- \`docs\` — Documentation updates"
              echo "- \`style\` — Code style changes (whitespace, formatting)"
              echo "- \`refactor\` — Code refactoring without behavior changes"
              echo "- \`perf\` — Performance improvements"
              echo "- \`test\` — Test additions or corrections"
              echo "- \`build\` — Build system or dependency updates"
              echo "- \`ci\` — CI/CD configurations"
              echo "- \`chore\` — General maintenance tasks"
              echo "- \`revert\` — Reverting previous commits"
              echo ""
              echo "#### 💡 How to fix"
              echo "Edit the title of this Pull Request on GitHub to match the specification (e.g., \`feat(ci): add pr title validation\`)."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          {
            echo "### ✅ PR Title Validation Passed"
            echo "PR title **'$PR_TITLE'** conforms to Conventional Commits."
          } >> "$GITHUB_STEP_SUMMARY"

  # ================================================================
  # 2. CI PIPELINE (Reusable Workflow)
  # ================================================================
  ci:
    needs: [branch-name-lint, pr-title-lint]
    uses: grzegorzfranus/github-actions-workflows/.github/workflows/ansible-ci.yml@main
    with:
      molecule-distros: '["ubuntu2404", "ubuntu2204", "debian12", "debian11", "rockylinux9"]'

  # ================================================================
  # 3. MERGE CHECK — Caller-level gate for branch protection
  # ================================================================
  merge-check:
    name: "Merge Check"
    needs: [branch-name-lint, pr-title-lint, ci]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: "Evaluate results"
        run: |
          echo "Branch Name Lint: ${{ needs.branch-name-lint.result }}"
          echo "PR Title Lint: ${{ needs.pr-title-lint.result }}"
          echo "CI: ${{ needs.ci.result }}"

          if [[ "${{ needs.branch-name-lint.result }}" != "success" ]]; then
            echo "::error::Branch Name Lint failed"
            exit 1
          fi

          if [[ "${{ needs.pr-title-lint.result }}" != "success" ]]; then
            echo "::error::PR Title Lint failed"
            exit 1
          fi

          if [[ "${{ needs.ci.result }}" != "success" ]]; then
            echo "::error::CI pipeline failed"
            exit 1
          fi

          echo "All checks passed"
